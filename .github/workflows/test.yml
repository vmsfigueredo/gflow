name: test

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Install git-flow-avh
        run: sudo apt-get install -y git-flow
      - name: Test
        run: go test -race ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
